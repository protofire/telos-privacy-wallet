name: Deploy Web to S3 Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20.x"

jobs:
  deploy:
    name: Build and Deploy to S3 staging
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build zkbob-client-js
        run: yarn workspace zkbob-client-js build

      - name: Build web application
        env:
          CI: false
          NODE_OPTIONS: --max-old-space-size=4096
          REACT_APP_CONFIG: "dev"
          REACT_APP_BUILD_TARGET: "web"
          REACT_APP_WALLETCONNECT_PROJECT_ID: ${{ secrets.REACT_APP_WALLETCONNECT_PROJECT_ID }}
          REACT_APP_LOCK_TIMEOUT: 300000
          REACT_APP_BASE_URL: "https://privacy-staging.telos.protofire.io"
        run: yarn build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: us-east-2

      - name: Sync build to S3
        run: |
          aws s3 sync apps/zktelos-wallet/build/ s3://telos-privacy-ui-staging/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "manifest.json"

          aws s3 cp apps/zktelos-wallet/build/index.html s3://telos-privacy-ui-staging/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

          aws s3 cp apps/zktelos-wallet/build/manifest.json s3://telos-privacy-ui-staging/manifest.json \
            --cache-control "no-cache, no-store, must-revalidate" || true

          aws s3 sync apps/zktelos-wallet/electron/assets/ s3://telos-privacy-ui-staging/ \
              --cache-control "public, max-age=31536000, immutable" \
              --exclude "*" \
              --include "transfer_params_22022023.bin" \
              --include "transfer_verification_key_22022023.json"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3AC0KPV26090S \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "✅ Deployment successful!"
          echo "📦 Bucket: s3://telos-privacy-ui-staging"
          echo "🌐 URL: https://privacy-staging.telos.protofire.io"
          echo "🔄 CloudFront cache invalidated"
