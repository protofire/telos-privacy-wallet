name: Build Electron with Rust Addon

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  NODE_VERSION: "20.x"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (ARM64 & x64)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build zkbob-client-js
        run: yarn workspace zkbob-client-js build

      - name: Build Rust library
        run: yarn workspace libzkbob-rs-node build

      - name: Create .env file
        run: |
          echo "REACT_APP_CONFIG=dev" > apps/zktelos-wallet/.env
          echo "REACT_APP_BUILD_TARGET=electron" >> apps/zktelos-wallet/.env
          echo "REACT_APP_WALLETCONNECT_PROJECT_ID=${{ secrets.REACT_APP_WALLETCONNECT_PROJECT_ID }}" >> apps/zktelos-wallet/.env
          echo "REACT_APP_LOCK_TIMEOUT=300000" >> apps/zktelos-wallet/.env
          echo "REACT_APP_BASE_URL=https://zkwallet.telos.net" >> apps/zktelos-wallet/.env

      - name: Build Electron app
        env:
          CI: false
          NODE_OPTIONS: --max-old-space-size=8192
          GENERATE_SOURCEMAP: false
        run: yarn electron:build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            apps/zktelos-wallet/dist/*.dmg
            apps/zktelos-wallet/dist/*.zip
          retention-days: 5

  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          target: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: |
          yarn config set network-timeout 600000
          yarn install --frozen-lockfile --network-concurrency 1

      - name: Build zkbob-client-js
        run: yarn workspace zkbob-client-js build

      - name: Build Rust library
        run: yarn workspace libzkbob-rs-node build

      - name: Create .env file
        shell: pwsh
        run: |
          @"
          REACT_APP_CONFIG=dev
          REACT_APP_BUILD_TARGET=electron
          REACT_APP_WALLETCONNECT_PROJECT_ID=${{ secrets.REACT_APP_WALLETCONNECT_PROJECT_ID }}
          REACT_APP_LOCK_TIMEOUT=300000
          REACT_APP_BASE_URL=https://zkwallet.telos.net
          "@ | Out-File -FilePath apps/zktelos-wallet/.env -Encoding utf8

      - name: Build Electron app
        env:
          CI: false
          NODE_OPTIONS: --max-old-space-size=8192
          GENERATE_SOURCEMAP: false
        run: yarn workspace zktelos-wallet electron:build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            apps/zktelos-wallet/dist/*.exe
          retention-days: 5

  build-linux:
    name: Build Linux (x64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build zkbob-client-js
        run: yarn workspace zkbob-client-js build

      - name: Build Rust library
        run: yarn workspace libzkbob-rs-node build

      - name: Create .env file
        run: |
          echo "REACT_APP_CONFIG=dev" > apps/zktelos-wallet/.env
          echo "REACT_APP_BUILD_TARGET=electron" >> apps/zktelos-wallet/.env
          echo "REACT_APP_WALLETCONNECT_PROJECT_ID=${{ secrets.REACT_APP_WALLETCONNECT_PROJECT_ID }}" >> apps/zktelos-wallet/.env
          echo "REACT_APP_LOCK_TIMEOUT=300000" >> apps/zktelos-wallet/.env
          echo "REACT_APP_BASE_URL=https://zkwallet.telos.net" >> apps/zktelos-wallet/.env

      - name: Build Electron app
        env:
          CI: false
          NODE_OPTIONS: --max-old-space-size=8192
          GENERATE_SOURCEMAP: false
        run: yarn electron:build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            apps/zktelos-wallet/dist/*.AppImage
            apps/zktelos-wallet/dist/*.deb
          retention-days: 5

  create-release-draft:
    name: Create Release Draft
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release Draft
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            artifacts/macos-installers/*
            artifacts/windows-installer/*
            artifacts/linux-installers/*
          body: |
            ## zkTelos Wallet Release

            ### Downloads

            **macOS:**
            - `.dmg` - Installer standard (recommended)
            - `.zip` - Portable version

            **Windows:**
            - `.exe` - NSIS installer for Windows x64

            **Linux:**
            - `.AppImage` - Portable application (no requires installation)
            - `.deb` - Debian/Ubuntu package

            ---

            🦀 Built with Rust | ⚡ Powered by Electron
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
